replicaCount: 1

image:
  repository: go-web-app
  pullPolicy: IfNotPresent
  tag: "dev"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    argocd.argoproj.io/ignore-healthcheck: "true"
  hosts:
    - host: go-web-app.local
      paths:
        - path: /
          pathType: Prefix
