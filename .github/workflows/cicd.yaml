name: CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - helm/go-web-app-chart/values-eks.yaml
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"

jobs:
  verify:
    name: Test, vet, and validate Helm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint and render Helm environments
        run: |
          helm lint helm/go-web-app-chart -f helm/go-web-app-chart/values-kind.yaml
          helm lint helm/go-web-app-chart -f helm/go-web-app-chart/values-eks.yaml
          helm template go-web-app helm/go-web-app-chart \
            -f helm/go-web-app-chart/values-kind.yaml >/dev/null
          helm template go-web-app helm/go-web-app-chart \
            -f helm/go-web-app-chart/values-eks.yaml >/dev/null

  code-quality:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  container:
    name: Build container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build without pushing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: go-web-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DOCKERHUB_PUSH == 'true'
    needs:
      - verify
      - code-quality
      - container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update EKS image tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DOCKERHUB_PUSH == 'true'
    needs:
      - publish
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Update the EKS image values
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          sed -i "s|^  repository:.*|  repository: ${DOCKERHUB_USERNAME}/go-web-app|" helm/go-web-app-chart/values-eks.yaml
          sed -i "s|^  tag:.*|  tag: \"${GITHUB_SHA}\"|" helm/go-web-app-chart/values-eks.yaml

      - name: Commit and push GitOps change
        run: |
          if git diff --quiet -- helm/go-web-app-chart/values-eks.yaml; then
            echo "The EKS image values are already current."
            exit 0
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add helm/go-web-app-chart/values-eks.yaml
          git commit -m "chore(gitops): deploy ${GITHUB_SHA}"
          git pull --rebase origin main
          git push origin main
